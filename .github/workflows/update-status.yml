name: Update profile status

on:
  schedule:
    # 18:00 UTC = 20:00 Berlin (CEST, summer) / 19:00 Berlin (CET, winter).
    # GitHub cron has no DST, accept ~1h drift in winter. Cron is also
    # frequently delayed under load — exact firing time is best-effort.
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update_status.py'
      - 'scripts/post_to_social.py'
      - '.github/workflows/update-status.yml'

permissions:
  contents: write

concurrency:
  group: update-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate status & update README (Haiku)
        env:
          GH_USER_PAT: ${{ secrets.GH_USER_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_USER: bizrockman
        run: python scripts/update_status.py

      - name: Post to Bluesky & update SHIPPING.md (Sonnet)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python scripts/post_to_social.py
        continue-on-error: true

      - name: Commit changes (if any)
        run: |
          # We track three things: README (NOW block), SHIPPING.md, and .state/
          # The .state/ folder is committed so dedup state persists across runs.
          # last-haiku.json is regenerated each run so we don't need to track it,
          # but harmless if we do — it's small and stays in sync.
          git config user.name "bizrockman-bot"
          git config user.email "d.gerst@bizrock.de"
          git add README.md SHIPPING.md .state/ 2>/dev/null || true
          if git diff --quiet --cached; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh Now block + shipping log"
            git push
          fi
